<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevHub | Сеть для Разработчиков</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;700&display=swap');

        :root {
            --bg-color: #0d1117;
            --panel-bg: #1e1e2e;
            --primary: #cba6f7; /* Фиолетовый неон */
            --secondary: #89b4fa; /* Синий */
            --success: #a6e3a1; /* Зеленый */
            --text-main: #cdd6f4;
            --text-sub: #6c7086;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
        }

        /* --- ШАПКА --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(30, 30, 46, 0.9); backdrop-filter: blur(10px);
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #313244; z-index: 100;
        }

        .logo { font-family: 'Fira Code', monospace; font-size: 24px; font-weight: bold; color: var(--primary); text-shadow: 0 0 10px rgba(203, 166, 247, 0.4); }
        .logo span { color: var(--text-main); }

        /* --- ЛЕЙАУТ --- */
        .container {
            display: flex; width: 100%; max-width: 900px; margin-top: 80px; gap: 20px; padding: 0 20px;
        }

        /* ЛЕНТА ПОСТОВ */
        .feed { flex: 1; }

        /* ФОРМА СОЗДАНИЯ ПОСТА */
        .create-post {
            background: var(--panel-bg); padding: 20px; border-radius: 12px;
            border: 1px solid #313244; margin-bottom: 20px;
        }
        
        .create-post input {
            width: 100%; background: #11111b; border: 1px solid #313244; color: white;
            padding: 10px; border-radius: 8px; font-family: inherit; margin-bottom: 10px;
            font-weight: bold;
        }

        .create-post textarea {
            width: 100%; background: #11111b; border: 1px solid #313244; color: white;
            padding: 15px; border-radius: 8px; resize: none; font-family: inherit; margin-bottom: 10px;
            min-height: 80px;
        }

        .create-post input:focus, .create-post textarea:focus { border-color: var(--primary); outline: none; }
        
        .btn {
            background: var(--primary); color: #11111b; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.2s; font-family: 'Fira Code', monospace; float: right;
        }
        .btn:hover { background: #b4befe; box-shadow: 0 0 15px rgba(203, 166, 247, 0.5); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .clearfix::after { content: ""; clear: both; display: table; }

        /* САМ ПОСТ */
        .post {
            background: var(--panel-bg); padding: 20px; border-radius: 12px;
            border: 1px solid #313244; margin-bottom: 20px; transition: 0.2s;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .post:hover { border-color: #45475a; }
        
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .author-info { display: flex; align-items: center; gap: 10px; }
        .small-ava { width: 40px; height: 40px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #111; }
        .author-name { font-weight: bold; font-size: 16px; color: var(--primary); }
        .post-time { color: var(--text-sub); font-size: 12px; }

        .post-content { line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; font-size: 15px;}
        
        /* СТАТУС ЗАГРУЗКИ */
        .loading { text-align: center; color: var(--text-sub); margin: 20px 0; font-family: 'Fira Code'; animation: blink 1s infinite;}
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.5;} }
    </style>
</head>
<body>

    <header>
        <div class="logo">Dev<span>Hub</span></div>
    </header>

    <div class="container">
        <!-- ЛЕНТА -->
        <div class="feed">
            
            <!-- НАПИСАТЬ ПОСТ -->
            <div class="create-post clearfix">
                <input type="text" id="authorInput" placeholder="F14" maxlength="20">
                <textarea id="textInput" placeholder="Что нового в разработке? Расскажи или покажи код..."></textarea>
                <button class="btn" id="sendBtn" onclick="sendPost()">Опубликовать</button>
            </div>

            <!-- ЗДЕСЬ БУДУТ ПОЯВЛЯТЬСЯ ПОСТЫ ИЗ БАЗЫ ДАННЫХ -->
            <div id="postsContainer">
                <div class="loading">Подключение к серверу... Загрузка постов...</div>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ ВНИМАНИЕ: ЗАМЕНИ ССЫЛКУ НИЖЕ НА СВОЮ! ⚠️
        // ==========================================
        const SERVER_URL = "https://f14.pythonanywhere.com"; // <-- ПРОВЕРЬ СВОЙ НИК ЗДЕСЬ!

        // Функция загрузки постов с сервера
        async function fetchPosts() {
            const container = document.getElementById('postsContainer');
            
            try {
                // Идем на сервер по адресу /get_posts
                const response = await fetch(`${SERVER_URL}/get_posts`);
                const posts = await response.json();
                
                container.innerHTML = ''; // Очищаем статус загрузки
                
                if (posts.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#6c7086;">Пока нет постов. Стань первым!</div>';
                    return;
                }

                // Рисуем каждый пост
                posts.forEach(post => {
                    // Берем первую букву ника для аватарки
                    let firstLetter = post.author.charAt(0).toUpperCase();
                    
                    let postHTML = `
                    <div class="post">
                        <div class="post-header">
                            <div class="author-info">
                                <div class="small-ava">${firstLetter}</div>
                                <div>
                                    <div class="author-name">${escapeHTML(post.author)}</div>
                                    <div class="post-time">${post.date}</div>
                                </div>
                            </div>
                        </div>
                        <div class="post-content">${escapeHTML(post.text)}</div>
                    </div>
                    `;
                    container.innerHTML += postHTML;
                });
            } catch (error) {
                container.innerHTML = `<div style="text-align:center; color:#f38ba8;">❌ Ошибка подключения к серверу. Убедись, что ссылка SERVER_URL правильная и сервер включен.</div>`;
                console.error("Ошибка:", error);
            }
        }

        // Функция отправки нового поста
        async function sendPost() {
            const author = document.getElementById('authorInput').value.trim();
            const text = document.getElementById('textInput').value.trim();
            const btn = document.getElementById('sendBtn');

            if (!author || !text) {
                alert("Напиши никнейм и текст поста!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Отправка...";

            try {
                // Отправляем данные на сервер по адресу /add_post
                const response = await fetch(`${SERVER_URL}/add_post`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author: author, text: text })
                });

                if (response.ok) {
                    // Очищаем поле ввода и обновляем ленту
                    document.getElementById('textInput').value = '';
                    fetchPosts(); 
                } else {
                    alert("Ошибка при сохранении на сервере!");
                }
            } catch (error) {
                alert("Нет связи с сервером! Проверь CORS или консоль.");
                console.error(error);
            }

            btn.disabled = false;
            btn.innerText = "Опубликовать";
        }

        // Защита от XSS (чтобы никто не вставил злой HTML код в пост)
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // При запуске страницы сразу загружаем посты
        fetchPosts();
    </script>
</body>
</html>
